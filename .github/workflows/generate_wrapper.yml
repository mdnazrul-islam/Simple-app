name: Generate Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Wrapper (Isolated Mode)
        run: |
          # ১. সাময়িকভাবে প্রজেক্ট ফাইলগুলো লুকিয়ে ফেলা (যাতে গ্র্যাডল এরর না দেয়)
          if [ -f settings.gradle ]; then mv settings.gradle settings.gradle.bak; fi
          if [ -f build.gradle ]; then mv build.gradle build.gradle.bak; fi

          # ২. এখন গ্র্যাডল ফাইলগুলো তৈরি করা (এখন কোনো বাধা নেই)
          gradle wrapper --gradle-version 8.0

          # ৩. লুকিয়ে ফেলা ফাইলগুলো আবার আগের জায়গায় ফিরিয়ে আনা
          if [ -f settings.gradle.bak ]; then mv settings.gradle.bak settings.gradle; fi
          if [ -f build.gradle.bak ]; then mv build.gradle.bak build.gradle; fi

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Fix: Force add Gradle Wrapper"
          file_pattern: "gradlew gradlew.bat gradle/wrapper/*"
